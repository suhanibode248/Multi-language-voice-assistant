<!DOCTYPE html>
<html>
<head>
    <title>Multi Language Voice Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
    <h2>🌐 Multi-Language Voice Assistant</h2>

    <div class="controls">
        <select id="language">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="tr">Turkish</option>
            <option value="te">Telugu</option>
        </select>

        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div id="chatBox" class="chat-box">
    <div class="bot">🤖 Hello! How can I help you?</div>
</div>

<div class="control-panel">

    <button onclick="startListening()">🎤 Speak</button>
    <button onclick="stopAll()">⏹ Stop</button>
    <button onclick="speakLast()">🔊 Read</button>

    <br><br>

    <input type="text" id="textInput" placeholder="Type your message...">
    <button onclick="sendText()">Send ➤</button>

    <br><br>

    <label>
        <input type="checkbox" id="autoTranslate" checked>
        Auto Translate ON
    </label>

    <p id="status"></p>
</div>

<script src="/static/script.js"></script>
</body>
</html>
